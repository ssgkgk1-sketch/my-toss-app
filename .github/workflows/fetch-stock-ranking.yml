name: Fetch Stock Ranking

on:
  schedule:
    # 한국 장중(09:00~15:30 KST)에 5분마다 실행
    # KST = UTC+9 이므로 UTC 기준 00:00~06:30
    - cron: '*/5 0-6 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼도 추가

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run script
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          cd scripts
          python3 fetch_stock_ranking.py
